  <style>
    .navigation {
      text-align: center;
      font-size: 1.3em;
      transition: font-size 0.25s ease-in-out, font-weight 0.5s ease-in-out, transform 0.25s ease-in-out;
      /* Add transform transition */
      font-weight: normal;
      /* Set initial font weight to italic */
      transform: translateX(0);
      /* Center the transition */
    }

    .navigation:hover {
      font-size: 1.45em;
      /* Change font weight to normal on hover */
      transform: translateX(0);
      /* Keep the transition centered */
    }

    h1 {
      text-align: center;
    }

    .bt {
      padding: 1em 2em;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #406997;
      transition: all 1000ms;
      font-size: 15px;
      position: relative;
      overflow: hidden;
      outline: 2px solid #406997;
    }

    .bt:hover {
      color: #ffffff;
      transform: scale(1.1);
      outline: 2px solid #7094ca;
      box-shadow: 4px 5px 17px -4px #265191;
    }

    .bt::before {
      content: "";
      position: absolute;
      left: -50px;
      top: 0;
      width: 0;
      height: 100%;
      background-color: #406997;
      transform: skewX(45deg);
      z-index: -1;
      transition: width 1000ms;
    }

    .bt:hover::before {
      width: 250%;
    }

    .center {
      display: block;
      margin-left: auto;
      margin-right: auto;
      width: 50%;
    }
  </style>
