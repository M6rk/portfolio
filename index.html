    body {

    .banner_container {
      position: relative;
      text-align: center;
      font-size: 1em;
    }

    .banner_container:hover {
      text-align: center;
      font-size: 1.03em;
      transition: font-size 0.5s ease-in-out;
    }

    .banner_container:not(:hover) {
      text-align: center;
      font-size: 1em;
      transition: font-size 0.5s ease-in-out;
    }

    .banner_centered {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .navigation {
  text-align: center;
  font-size: 1.3em;
  transition: transform 0.3s ease-in-out;
  transform: scale(1);
}

.navigation:hover {
  font-size: 1.3em;
  transform: scale(1.1);
}

    .brighten img {
      -webkit-filter: brightness(50%);
      -webkit-transition: all 1s ease;
      -moz-transition: all 1s ease;
      -o-transition: all 1s ease;
      -ms-transition: all 1s ease;
      transition: all 1s ease;
    }

    .brighten img:hover {
      -webkit-filter: brightness(100%);
    }

    h1 {
      text-align: center;
      text-transform: uppercase;
      font-family: arial, sans-serif;
      font-size: 5em;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 1px 1px 1px #66666648,
        1px 2px 1px #66666648,
        1px 3px 1px #66666648,
        1px 4px 1px #66666648,
        1px 5px 1px #66666648,
        1px 6px 1px #66666648,
        1px 7px 1px #66666648,

        1px 9px 1px #66666648,
        1px 10px 1px #66666648,
        0px 0px 0px rgba(16, 16, 16, 0.4);
    }

    .bt {
      padding: 1em 2em;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #48718d;
      transition: all 1000ms;
      font-size: 15px;
      position: relative;
      overflow: hidden;
      outline: 2px solid #48748d;
    }

    .bt:hover {
      color: #ffffff;
      transform: scale(1.1);
      outline: 2px solid #5d84b6;
      box-shadow: 4px 5px 17px -4px #3c5372;
    }

    .bt::before {
      content: "";
      position: absolute;
      left: -50px;
      top: 0;
      width: 0;
      height: 100%;
      background-color: #71afd8;
      transform: skewX(45deg);
      z-index: -1;
      transition: width 1000ms;
    }

    .bt:hover::before {
      width: 250%;
    }

    .center {
      display: block;
      margin-left: auto;
      margin-right: auto;
      width: 50%;
    }
